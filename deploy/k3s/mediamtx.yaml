apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  namespace: live
data:
  mediamtx.yml: |
    logLevel: info
    logDestinations: [stdout]

    # Every publish/read is authorized by naruto: WHIP publishes need a valid short-lived
    # token; the internal RTSP read is allowed only from localhost.
    authMethod: http
    authHTTPAddress: http://naruto.live.svc.cluster.local:8005/api/v1/whip-auth/

    webrtcAddress: :8889
    webrtcEncryption: no
    webrtcLocalUDPAddress: :8189
    webrtcAdditionalHosts: [192.168.1.53]
    webrtcICEServers2:
      - url: stun:stun.l.google.com:19302

    rtsp: yes
    rtspAddress: :8554

    rtmp: no
    hls: no
    srt: no

    pathDefaults:
      # A wrapper script, not inline ffmpeg: mediamtx percent-encodes '=' in $MTX_QUERY
      # (key%3D...), so the script URL-decodes it before handing the publish key to
      # nginx-rtmp. MTX_PATH is the channel; MTX_QUERY carries ?key=<key>.
      runOnReady: sh /bridge.sh $MTX_PATH $MTX_QUERY
      runOnReadyRestart: yes

    paths:
      all_others:
  bridge.sh: |
    #!/bin/sh
    # Bridge a WHIP/WebRTC path to the existing nginx-rtmp ingest.
    path="$1"
    query=$(printf '%s' "$2" | sed 's/%3D/=/g; s/%26/\&/g')
    # Re-encode video to fixed 30fps CFR with a closed 2s GOP + IDRs forced at t=0,2,4...,
    # matching nginx-rtmp dash_fragment 2s, so DASH segments are keyframe-aligned (smooth dash.js).
    exec ffmpeg -nostdin -hide_banner -loglevel warning \
      -rtsp_transport tcp -i "rtsp://localhost:8554/$path" \
      -r 30 -c:v libx264 -preset veryfast -tune zerolatency -pix_fmt yuv420p \
      -b:v 2500k -maxrate 2500k -bufsize 5000k \
      -g 60 -keyint_min 60 -sc_threshold 0 -force_key_frames 'expr:gte(t,n_forced*2)' \
      -c:a aac -ar 44100 -b:a 128k \
      -f flv "rtmp://rtmp.live.svc.cluster.local:1935/odeon/$path?$query"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx
  namespace: live
  labels:
    app: mediamtx
spec:
  replicas: 1
  # hostNetwork singleton: kill the old pod before starting the new one, or the new pod
  # can't bind bleu's ports (8889/8189) and hangs Pending.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
    spec:
      # Pin to bleu and use its network directly so WebRTC ICE sees real IPs.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: bleu
      containers:
        - name: mediamtx
          image: bluenviron/mediamtx:latest-ffmpeg
          ports:
            - { name: whip, containerPort: 8889, protocol: TCP }
            - { name: webrtc-udp, containerPort: 8189, protocol: UDP }
          # TURN relay (coturn on the ConoHa VM) added as ICE server #1 so mediamtx offers a
          # relay candidate reachable by internet publishers. Password from the `turn-cred`
          # secret — never in the committed config. See projects/gamma/docs/turn-setup.md.
          env:
            - name: MTX_WEBRTCICESERVERS2_1_URL
              value: "turn:163.44.111.168:3478?transport=tcp"
            - name: MTX_WEBRTCICESERVERS2_1_USERNAME
              value: "odeon"
            - name: MTX_WEBRTCICESERVERS2_1_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: turn-cred
                  key: password
          volumeMounts:
            - name: config
              mountPath: /mediamtx.yml
              subPath: mediamtx.yml
            - name: config
              mountPath: /bridge.sh
              subPath: bridge.sh
          readinessProbe:
            tcpSocket: { port: 8889 }
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: mediamtx-config
---
apiVersion: v1
kind: Service
metadata:
  name: mediamtx
  namespace: live
  labels:
    app: mediamtx
spec:
  type: ClusterIP
  selector:
    app: mediamtx
  ports:
    - { name: whip, port: 8889, targetPort: 8889, protocol: TCP }
